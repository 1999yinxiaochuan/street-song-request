<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>街角点歌台 - 支付</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&family=Noto+Sans+SC:wght@300;400;500;600;700&family=Noto+Serif+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/common.css">
    <style>
        body {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        header {
            padding: 1.5rem;
        }

        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .payment-container {
            max-width: 500px;
            margin: 0 auto;
            padding: 2rem 1rem;
            width: 100%;
        }

        .payment-card-full {
            background: #fff;
            border: 1px solid var(--border-card);
            border-radius: var(--radius-lg);
            overflow: hidden;
            box-shadow: var(--shadow-float);
            animation: fade-up 0.5s ease;
        }

        .payment-header {
            background: linear-gradient(135deg, var(--sunset) 0%, #f7931e 50%, #fbbf24 100%);
            color: #fff;
            padding: 1.8rem 1.5rem;
            text-align: center;
        }

        .payment-header h1 {
            font-family: var(--font-display);
            font-size: 1.7rem;
            font-weight: 700;
            margin-bottom: 0.4rem;
            color: #fff;
        }

        .payment-header .order-id {
            font-size: 0.85rem;
            color: rgba(255,255,255,0.85);
        }

        .order-summary-full {
            padding: 1.5rem;
            background: var(--bg-input);
            border-bottom: 1px solid var(--border-subtle);
        }

        .order-summary-full h3 {
            font-family: var(--font-display);
            font-size: 1.15rem;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 0.9rem;
        }

        .order-song-item-full {
            display: flex;
            justify-content: space-between;
            padding: 0.65rem 0;
            border-bottom: 1px solid var(--border-subtle);
            color: var(--text-secondary);
            font-size: 0.95rem;
        }

        .order-song-item-full:last-child {
            border-bottom: none;
        }

        .order-total-full {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 1rem;
            padding-top: 0.9rem;
            border-top: 2px solid var(--border-accent);
            font-size: 1.15rem;
            font-weight: 700;
            color: var(--text-primary);
        }

        .total-price-full {
            font-size: 1.8rem;
            color: var(--sunset);
            font-weight: 800;
        }

        .qr-section {
            padding: 2rem;
            text-align: center;
        }

        .qr-instruction {
            font-size: 1rem;
            color: var(--text-secondary);
            margin-bottom: 1.2rem;
            font-weight: 600;
        }

        .qr-container-full {
            width: 250px;
            height: 250px;
            margin: 0 auto 1.2rem;
            background: #fff;
            border: 3px dashed var(--border-accent);
            border-radius: var(--radius-lg);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            animation: border-pulse 3s ease-in-out infinite;
        }

        .qr-container-full img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            border-radius: var(--radius-md);
        }

        .qr-container-full .qr-icon {
            font-size: 3.5rem;
            color: var(--sunset);
        }

        .qr-container-full p {
            color: var(--text-muted);
            margin-top: 0.4rem;
            font-size: 0.85rem;
        }

        .qr-tip{font-size:0.95rem;color:var(--sunset-deep);font-weight:600;margin-bottom:1.2rem;padding:0.7rem 1rem;background:linear-gradient(135deg,#fef2f2 0%,#fff7ed 100%);border:2px solid rgba(239,68,68,0.2);border-radius:var(--radius-md);text-align:center;line-height:1.7}

        .payment-confirm-full {
            background: linear-gradient(135deg, #f0fdf4 0%, #dcfce7 100%);
            border-top: 2px dashed rgba(34, 197, 94, 0.3);
            padding: 1.8rem;
            text-align: center;
        }

        .btn-confirm-full {
            width: 100%;
            padding: 1.15rem 2rem;
            background: linear-gradient(135deg, #22c55e 0%, #16a34a 100%);
            color: white;
            border: none;
            border-radius: var(--radius-md);
            font-size: 1.2rem;
            font-weight: 700;
            font-family: var(--font-body);
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: var(--shadow-success);
            letter-spacing: 0.02em;
        }

        .btn-confirm-full:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 28px rgba(34, 197, 94, 0.4);
        }

        .confirm-hint-full {
            margin-top: 0.8rem;
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 1.5rem;
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.9rem;
            transition: color 0.3s ease;
        }

        .back-link:hover {
            color: var(--sunset);
        }

        /* 加载/完成状态 */
        .loading-state {
            text-align: center;
            padding: 3rem;
            color: var(--text-muted);
        }

        .loading-spinner {
            width: 44px;
            height: 44px;
            border: 3px solid rgba(255, 107, 53, 0.12);
            border-top-color: var(--sunset);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 1rem;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .success-state {
            text-align: center;
            padding: 3rem;
        }

        .success-icon {
            font-size: 3.5rem;
            margin-bottom: 0.8rem;
        }

        .success-state h2 {
            font-family: var(--font-display);
            font-size: 1.6rem;
            font-weight: 700;
            color: var(--success);
            margin-bottom: 0.4rem;
        }

        .success-state p {
            color: var(--text-muted);
            font-size: 0.95rem;
        }
    </style>
</head>
<body>
    <div class="loading-overlay" id="loading-overlay">
        <div class="loading-spinner">
            <div class="spinner-ring"></div>
            <p class="loading-text">🎵 加载中...</p>
        </div>
    </div>
    <header>
        <div class="logo-area">
            <span class="music-icon">♪</span>
            <h1>街角点歌台</h1>
        </div>
    </header>

    <main>
        <div class="payment-container" id="payment-container">
            <!-- 加载状态 -->
            <div class="loading-state" id="loading-state">
                <div class="loading-spinner"></div>
                <p>加载订单中...</p>
            </div>
            
            <!-- 支付内容 -->
            <div class="payment-card-full hidden" id="payment-content">
                <div class="payment-header">
                    <h1>💳 点歌支付</h1>
                    <div class="order-id" id="order-id"></div>
                </div>
                
                <div class="order-summary-full">
                    <h3>📋 订单详情</h3>
                    <div id="order-songs"></div>
                    <div class="order-total-full">
                        <span>总计：</span>
                        <span class="total-price-full" id="total-price">¥0</span>
                    </div>
                </div>
                
                <div class="qr-section">
                    <p class="qr-instruction">📱 请长按保存下方收款码图片，然后进行支付</p>
                    <div class="qr-container-full" id="payment-qr">
                        <span class="qr-icon">¥</span>
                        <p>扫码支付</p>
                    </div>
                    <p class="qr-tip" id="qr-tip">⚠️ 付款完成后务必点击下方按钮确认，否则歌手无法收到您的点歌！</p>
                </div>
                
                <div class="payment-confirm-full"><button class="btn-confirm-full" onclick="confirmPayment().then(()=>window.location.href='/')">✅ 已扫码支付完成</button></div>
            </div>
            
            <!-- 完成状态 -->
            <div class="success-state hidden" id="success-state">
                <div class="success-icon">✅</div>
                <h2>已提交确认</h2>
                <p>等待歌手确认收款...</p>
                <a href="/" class="back-link">← 返回点歌页面</a>
            </div>
        </div>
    </main>

    <script src="js/payment.js"></script>
</body>
</html>
